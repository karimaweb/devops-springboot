name: DevOps Pipeline

on:
  push:
    branches:
      - toAzure

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix permission
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Build Docker
        run: docker build -t karimaweb/app-devops:latest .

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker
        run: docker push karimaweb/app-devops:latest

      - name: Deploy Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: TON_APP_AZURE
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: karimaweb/app-devops:latest
